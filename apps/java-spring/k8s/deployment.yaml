apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-spring
  labels:
    app: java-spring
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java-spring
  template:
    metadata:
      labels:
        app: java-spring
        tier: backend
    spec:
      containers:
        - name: java-spring
          # Spring PetClinic is the canonical Spring Boot demo application
          image: springio/petclinic:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 20
            failureThreshold: 3
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "default"
