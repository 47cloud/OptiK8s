# KIND cluster configuration for whatwillaido local development.
#
# Creates a 3-node cluster (1 control-plane + 2 workers) with:
#   - HTTP  (port 80)  exposed on localhost:8080
#   - HTTPS (port 443) exposed on localhost:8443
#   - NodePort range    exposed on localhost:30000-32767
#
# Usage:
#   kind create cluster --name whatwillaido --config clusters/kind/cluster-config.yaml
#
# Requirements: kind, kubectl, docker
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

name: whatwillaido

nodes:
  # Control-plane node
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # HTTP ingress
      - containerPort: 80
        hostPort: 8080
        listenAddress: "127.0.0.1"
        protocol: TCP
      # HTTPS ingress
      - containerPort: 443
        hostPort: 8443
        listenAddress: "127.0.0.1"
        protocol: TCP

  # Worker nodes
  - role: worker
  - role: worker

# Networking defaults (can be overridden)
networking:
  # Disable IPv6 for simplicity in local dev
  ipFamily: ipv4
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/12"
