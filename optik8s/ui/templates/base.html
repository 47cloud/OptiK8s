<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OptiK8s – K8s Cluster Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet" />
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold text-info" href="/">
      <i class="bi bi-cloud-haze2-fill me-2"></i>OptiK8s
    </a>
    <span class="navbar-text text-muted small">
      K8s Cluster &amp; Workload Manager
    </span>
  </div>
</nav>

<div class="container-fluid py-4">

  <!-- Toast notifications -->
  <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index:2000" id="toastContainer"></div>

  <!-- Loading overlay -->
  <div id="loadingOverlay" class="d-none position-fixed top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center"
       style="background:rgba(0,0,0,.6);z-index:1999">
    <div class="text-center text-white">
      <div class="spinner-border text-info mb-3" style="width:3rem;height:3rem"></div>
      <p class="fw-bold" id="loadingMsg">Working…</p>
    </div>
  </div>

  {% block content %}{% endblock %}

</div><!-- /container-fluid -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
